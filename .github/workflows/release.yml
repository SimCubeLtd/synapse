name: Release

# Build multi-arch binaries and attach them to the GitHub Release.
# Triggered when a release is published (or manually for testing).
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to attach artifacts to (manual runs)"
        required: true
        type: string

permissions:
  contents: write # required to upload assets to the release

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # 24.04 (GCC 13+) provides <format>, required by lbug's C++ headers.
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          # macOS is Apple Silicon only. The Intel runner (macos-13) is retired
          # and Apple/GitHub are sunsetting x86_64 macOS — Intel Mac users can
          # run the arm64 build under Rosetta while it lasts.
          - os: macos-15
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          # NOTE: no aarch64-pc-windows-msvc target — LadybugDB (lbug) ships no
          # prebuilt static lib for Windows arm64 and its C++ can't be built
          # from source there in CI. Windows-on-ARM runs the x86_64 build under
          # emulation. Revisit if upstream adds a windows-aarch64 release asset.

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      # Pin LBUG_VERSION so lbug's build script downloads the matching prebuilt
      # static lib directly, instead of querying the (IP-rate-limited on CI)
      # GitHub "latest release" API. A failed query makes lbug fall back to
      # building from source, which on macOS produces colliding static archives
      # that fail to link. Pinning the version makes the prebuilt download
      # deterministic on every runner.
      - name: Build release binary
        env:
          LBUG_VERSION: "0.17.0"
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Determine version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "tag=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Package (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          staging="synapse-${{ steps.version.outputs.tag }}-${{ matrix.target }}"
          mkdir -p "$staging"
          cp "target/${{ matrix.target }}/release/synapse" "$staging/"
          cp README.md "$staging/" 2>/dev/null || true
          tar -czf "$staging.tar.gz" "$staging"
          echo "ASSET=$staging.tar.gz" >> "$GITHUB_ENV"

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $staging = "synapse-${{ steps.version.outputs.tag }}-${{ matrix.target }}"
          New-Item -ItemType Directory -Force -Path $staging | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/synapse.exe" "$staging/"
          if (Test-Path README.md) { Copy-Item README.md "$staging/" }
          Compress-Archive -Path $staging -DestinationPath "$staging.zip"
          "ASSET=$staging.zip" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload artifact (workflow run)
        uses: actions/upload-artifact@v4
        with:
          name: synapse-${{ matrix.target }}
          path: ${{ env.ASSET }}

      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          files: ${{ env.ASSET }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
